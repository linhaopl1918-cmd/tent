<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDXy5xqyp0r5JgSwhT3UAIbkjjlErHOUqk",
    authDomain:        "tentmakers-map.firebaseapp.com",
    projectId:         "tentmakers-map",
    storageBucket:     "tentmakers-map.firebasestorage.app",
    messagingSenderId: "912909055987",
    appId:             "1:912909055987:web:e6c6aa16cc6eb898344486"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  window._db         = db;
  window._addDoc     = addDoc;
  window._getDocs    = getDocs;
  window._collection = collection;

  window.addEventListener('mapReady', async () => {
    try {
      const snap = await getDocs(collection(db, 'tents'));
      snap.forEach(doc => window.addTentMarker(doc.data()));
    } catch(e) { console.warn('Load tents failed', e); }
  });
</script>

const map = L.map('map').setView([20, 10], 2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

const COLORS = { 1:'#2979a0', 2:'#d4850a', 3:'#a8bcc8', 0:'#dddddd' };
let geoLayer, tentMode = false, pendingLL = null, pendingImg = null;

fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
  .then(r => r.json())
  .then(data => {
    geoLayer = L.geoJSON(data, {
      style(feature) {
        const d = DATA[feature.properties.ADMIN || feature.properties.NAME];
        const cat = d ? d.cat : 0;
        return { fillColor: COLORS[cat], fillOpacity: cat===1?.75:cat===2?.70:cat===3?.45:.20, color:'#fff', weight:.7 };
      },
      onEachFeature(feature, layer) {
        layer.on({
          mouseover(e) { if (!tentMode) e.target.setStyle({ weight:2, color:'#c8922a' }); },
          mouseout(e)  { if (!tentMode) geoLayer.resetStyle(e.target); },
          click(e) {
            if (tentMode) return;
            const name = feature.properties.ADMIN || feature.properties.NAME;
            showPanel(name, DATA[name]);
            L.DomEvent.stopPropagation(e);
          }
        });
      }
    }).addTo(map);
    window.dispatchEvent(new Event('mapReady'));
  });

map.on('click', () => { if (!tentMode) closePanel(); });

function showPanel(name, d) {
  document.getElementById('panel').style.display = 'block';
  document.getElementById('panel-title').textContent = name;
  if (!d) {
    document.getElementById('panel-body').innerHTML = '<p style="color:#999;font-size:13px;padding:8px 0">No church records for this country.</p>';
    return;
  }
  const catText = {1:'⛪ Has Church / Prayer House', 2:'🏠 Believers / Meeting Point only', 3:'📋 On record — no member data'}[d.cat];
  document.getElementById('panel-body').innerHTML = `
    <div style="padding:4px 0 10px;font-size:12px;color:#c8922a;font-weight:600">${catText}</div>
    <div class="stat"><span>Services started</span><span>${d.year}</span></div>
    <div class="stat"><span>Members</span><span>${d.members ? d.members.toLocaleString() : '—'}</span></div>
    <div class="stat"><span>Churches</span><span>${d.churches||'—'}</span></div>
    <div class="stat"><span>Prayer Houses</span><span>${d.prayer||'—'}</span></div>
    <div class="stat"><span>Meeting Points</span><span>${d.worship||'—'}</span></div>
    <div class="stat"><span>Baptisms</span><span>${d.baptisms||'—'}</span></div>
    <div class="stat"><span>Preachers</span><span>${d.preachers||'—'}</span></div>`;
}
function closePanel() { document.getElementById('panel').style.display = 'none'; }

function toggleTent() {
  tentMode = !tentMode;
  const btn = document.getElementById('tent-btn');
  btn.classList.toggle('active', tentMode);
  btn.textContent = tentMode ? '✕ Cancel' : '⛺ Place a Tent';
  document.getElementById('tent-hint').style.display = tentMode ? 'block' : 'none';
  map.getContainer().style.cursor = tentMode ? 'crosshair' : '';
}

map.on('click', e => {
  if (!tentMode) return;
  pendingLL = e.latlng;
  document.getElementById('form-overlay').classList.add('show');
  ['f-name','f-job','f-msg'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-img').value = '';
  document.getElementById('preview-img').style.display = 'none';
  document.getElementById('saving-msg').style.display = 'none';
  pendingImg = null;
});

function closeForm() { document.getElementById('form-overlay').classList.remove('show'); pendingLL = null; }

function previewImg(input) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      const r = Math.min(1, 400/img.width);
      c.width = img.width*r; c.height = img.height*r;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      pendingImg = c.toDataURL('image/jpeg', 0.72);
      const el = document.getElementById('preview-img');
      el.src = pendingImg; el.style.display = 'block';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}

async function saveTent() {
  if (!pendingLL) return;
  const pin = {
    lat: pendingLL.lat, lng: pendingLL.lng,
    name: document.getElementById('f-name').value.trim() || 'Anonymous Tentmaker',
    job:  document.getElementById('f-job').value.trim(),
    msg:  document.getElementById('f-msg').value.trim(),
    img:  pendingImg || null,
    ts:   Date.now()
  };
  document.getElementById('saving-msg').style.display = 'block';
  try {
    await window._addDoc(window._collection(window._db, 'tents'), pin);
  } catch(e) { console.warn('Firebase save failed', e); }
  addTentMarker(pin);
  closeForm();
  toggleTent();
}

const tentIcon = L.divIcon({
  className:'',
  html:'<div style="font-size:26px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.4))">⛺</div>',
  iconSize:[30,30], iconAnchor:[15,28], popupAnchor:[0,-30]
});

window.addTentMarker = function(pin) {
  const date = new Date(pin.ts).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
  L.marker([pin.lat,pin.lng],{icon:tentIcon})
    .bindPopup(`
      <b style="color:#1a4b7a;font-size:13px">${esc(pin.name)}</b><br>
      ${pin.job?`<span style="color:#c8922a;font-size:11px">${esc(pin.job)}</span><br>`:''}
      ${pin.msg?`<p style="margin:6px 0;font-size:12px;line-height:1.5">${esc(pin.msg)}</p>`:''}
      ${pin.img?`<img src="${pin.img}" style="width:100%;border-radius:6px;margin-top:4px">`:''}
      <span style="font-size:10px;color:#999">${date}</span>
    `,{maxWidth:230}).addTo(map);
};

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
